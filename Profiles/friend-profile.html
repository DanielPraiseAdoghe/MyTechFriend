<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Profile</title>

<style>
:root {
    --bg-light: #f5f5f5;
    --bg: #f2e3bb;
    --light-brown: #C0B87A;
    --light-green: #427A43;
    --dark-green: #005F02;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    color:var(--dark-green);
    animation:fadePage 0.4s ease;
}

@keyframes fadePage{
    from{opacity:0;}
    to{opacity:1;}
}

/* COVER */
.cover{
    height:220px;
    background:linear-gradient(135deg,var(--light-green),var(--dark-green));
}

/* CARD */
.profile-card{
    background:white;
    width:90%;
    max-width:1100px;
    margin:-100px auto 40px auto;
    border-radius:25px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

/* BACK */
.back{
    margin-bottom:20px;
    cursor:pointer;
    color:var(--light-green);
    font-weight:600;
}

/* HEADER */
.profile-header{
    display:flex;
    flex-wrap:wrap;
    gap:25px;
    align-items:center;
}

.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid white;
    position:relative;
}

.online-dot{
    width:18px;
    height:18px;
    background:limegreen;
    border-radius:50%;
    position:absolute;
    bottom:10px;
    right:10px;
    border:3px solid white;
}

.profile-info h2{
    margin-bottom:8px;
}

.country{
    background:var(--light-brown);
    padding:6px 14px;
    border-radius:20px;
    font-size:13px;
    display:inline-block;
    margin-top:5px;
}

.summary{
    margin-top:10px;
    color:#555;
}

/* ACTIONS */
.actions{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
    font-weight:500;
}

.primary{
    background:var(--light-green);
    color:white;
}

.primary:hover{
    background:var(--dark-green);
}

.secondary{
    background:var(--light-brown);
    color:white;
}

/* STATS */
.stats{
    display:flex;
    justify-content:space-around;
    margin:30px 0;
    text-align:center;
}

.stat h3{
    font-size:26px;
    color:var(--light-green);
}

/* SECTION TITLE */
.section-title{
    margin:25px 0 15px 0;
}

/* TAGS */
.tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.tag{
    background:var(--light-brown);
    padding:6px 14px;
    border-radius:20px;
    font-size:13px;
}

/* SKILLS */
.skill{
    margin-bottom:18px;
}

.skill-bar{
    height:8px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.skill-fill{
    height:100%;
    background:var(--light-green);
    width:0;
    transition:1.5s;
}

/* INTERESTS */
.interest-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
}

.interest{
    background:var(--bg-light);
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.interest:hover{
    background:var(--light-green);
    color:white;
}

/* RESPONSIVE */
@media(max-width:768px){
    .profile-header{
        flex-direction:column;
        text-align:center;
    }
    .actions{
        margin:15px 0 0 0;
    }
    .stats{
        flex-direction:column;
        gap:15px;
    }
}
</style>
</head>
<body>

<div class="cover"></div>

<div class="profile-card">

<div class="back" onclick="goBack()">← Back to Directory</div>

<div class="profile-header">
    <div style="position:relative;">
        <img id="avatar" class="avatar">
        <div class="online-dot"></div>
    </div>

    <div class="profile-info">
        <h2 id="name"></h2>
        <div id="country" class="country"></div>
        <p id="summary" class="summary"></p>
    </div>

    <div class="actions">
        <button class="btn primary" onclick="toChat()">Message</button>
        <button class="btn secondary">Start Project</button>
    </div>
</div>

<div class="stats">
    <div class="stat">
        <h3 id="projects">0</h3>
        <p>Projects</p>
    </div>
    <div class="stat">
        <h3 id="rating">0</h3>
        <p>Rating</p>
    </div>
    <div class="stat">
        <h3 id="friendsCount">0</h3>
        <p>Friends</p>
    </div>
</div>

<h3 class="section-title">Hobbies</h3>
<div class="tags" id="hobbies"></div>

<h3 class="section-title">Skills</h3>
<div id="skills"></div>

<h3 class="section-title">Interests</h3>
<div class="interest-grid" id="interests"></div>

</div>

<script>

/* GET STORED FRIEND */
const data = localStorage.getItem("selectedFriend");

if(!data){
    document.body.innerHTML="<h2 style='text-align:center;margin-top:100px;'>No profile selected.</h2>";
}else{
    const friend = JSON.parse(data);

    document.getElementById("avatar").src = friend.img;
    document.getElementById("name").innerText = friend.name;
    document.getElementById("country").innerText = friend.country;
    document.getElementById("summary").innerText = friend.summary;

    animateCounter("projects", friend.projects);
    animateCounter("rating", friend.rating);
    animateCounter("friendsCount", Math.floor(Math.random()*80)+20);

    /* HOBBIES (Auto-generated demo) */
    const hobbies = ["Coding","Reading","Music","Robotics"];
    hobbies.forEach(h=>{
        const tag=document.createElement("div");
        tag.className="tag";
        tag.innerText=h;
        document.getElementById("hobbies").appendChild(tag);
    });

    /* SKILLS */
    friend.skills.forEach(skill=>{
        const percent=Math.floor(Math.random()*30)+70;
        const wrapper=document.createElement("div");
        wrapper.className="skill";
        wrapper.innerHTML=`
            ${skill}
            <div class="skill-bar">
                <div class="skill-fill" style="width:${percent}%"></div>
            </div>
        `;
        document.getElementById("skills").appendChild(wrapper);
    });

    /* INTERESTS (Auto demo) */
    const interests=["🌍 Climate Tech","🤖 AI","📱 App Dev","🎨 Design"];
    interests.forEach(i=>{
        const div=document.createElement("div");
        div.className="interest";
        div.innerText=i;
        document.getElementById("interests").appendChild(div);
    });
}

/* COUNTER ANIMATION */
function animateCounter(id,value){
    let start=0;
    const end=parseFloat(value);
    const step=end/30;

    const interval=setInterval(()=>{
        start+=step;
        if(start>=end){
            start=end;
            clearInterval(interval);
        }
        document.getElementById(id).innerText =
            id==="rating" ? start.toFixed(1) : Math.floor(start);
    },30);
}

function goBack(){
    window.location.href="fd_2.html";
}
function toChat(){
    window.location.href="../Chat/chat.html";
}


</script>

</body>
</html>

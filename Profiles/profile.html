<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Profile</title>

<style>
:root {
    --bg-light: #f5f5f5;
    --bg: #f2e3bb;
    --light-brown: #C0B87A;
    --light-green: #427A43;
    --dark-green: #005F02;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    color:var(--dark-green);
}

/* COVER */
.cover{
    height:180px;
    background:linear-gradient(135deg,var(--light-green),var(--dark-green));
    position:relative;
}

/* PROFILE CARD */
.profile-card{
    background:white;
    width:90%;
    max-width:1000px;
    margin:-80px auto 30px auto;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* HEADER SECTION */
.profile-header{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:20px;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:var(--light-brown);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    color:white;
    border:5px solid white;
    position:relative;
}

.online-dot{
    width:18px;
    height:18px;
    background:limegreen;
    border-radius:50%;
    position:absolute;
    bottom:5px;
    right:5px;
    border:2px solid white;
}

.profile-info h2{
    margin-bottom:5px;
}

.country{
    background:var(--light-brown);
    padding:5px 10px;
    border-radius:15px;
    font-size:13px;
    display:inline-block;
    margin-top:5px;
}

/* BUTTONS */
.profile-actions{
    margin-left:auto;
    display:flex;
    gap:10px;
}

.btn{
    padding:8px 18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

.btn-primary{
    background:var(--light-green);
    color:white;
}

.btn-primary:hover{
    background:var(--dark-green);
}

.btn-secondary{
    background:var(--light-brown);
    color:white;
}

.btn-secondary:hover{
    opacity:0.8;
}

/* STATS */
.stats{
    display:flex;
    justify-content:space-around;
    margin:25px 0;
    text-align:center;
}

.stat h3{
    color:var(--light-green);
}

/* TABS */
.tabs{
    display:flex;
    gap:20px;
    border-bottom:2px solid var(--light-brown);
    margin-bottom:20px;
}

.tab{
    padding:10px;
    cursor:pointer;
    font-weight:500;
}

.tab.active{
    border-bottom:3px solid var(--dark-green);
}

/* CONTENT */
.section{
    display:none;
}

.section.active{
    display:block;
}

/* SKILLS */
.skill{
    margin-bottom:15px;
}

.skill-bar{
    height:8px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.skill-fill{
    height:100%;
    background:var(--light-green);
    width:0;
    transition:1.5s;
}

/* TAGS */
.tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.tag{
    background:var(--light-brown);
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
}

/* INTEREST GRID */
.interest-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:15px;
}

.interest{
    background:var(--bg-light);
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.interest:hover{
    background:var(--light-green);
    color:white;
}

/* RESPONSIVE */
@media(max-width:768px){
    .profile-header{
        flex-direction:column;
        text-align:center;
    }

    .profile-actions{
        margin:15px 0 0 0;
    }

    .stats{
        flex-direction:column;
        gap:15px;
    }
}
</style>
</head>
<body>

<div class="cover"></div>

<div class="profile-card">

<div class="profile-header">
    <div class="avatar">
        A
        <div class="online-dot"></div>
    </div>

    <div class="profile-info">
        <h2>Aisha Bello</h2>
        <p>Age: 14 | Level: Intermediate</p>
        <div class="country">🇳🇬 Nigeria</div>
    </div>

    <div class="profile-actions">
        <button class="btn btn-primary">Message</button>
        <button class="btn btn-secondary">Start Project</button>
    </div>
</div>

<div class="stats">
    <div class="stat">
        <h3>12</h3>
        <p>Projects</p>
    </div>
    <div class="stat">
        <h3>58</h3>
        <p>Friends</p>
    </div>
    <div class="stat">
        <h3>1,240</h3>
        <p>Points</p>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">Overview</div>
    <div class="tab" onclick="switchTab(1)">Skills</div>
    <div class="tab" onclick="switchTab(2)">Interests</div>
</div>

<!-- OVERVIEW -->
<div class="section active">
    <h3>Hobbies</h3>
    <div class="tags">
        <div class="tag">Coding</div>
        <div class="tag">Robotics</div>
        <div class="tag">Reading</div>
        <div class="tag">Art</div>
    </div>
</div>

<!-- SKILLS -->
<div class="section">
    <div class="skill">
        HTML
        <div class="skill-bar"><div class="skill-fill" style="width:90%"></div></div>
    </div>
    <div class="skill">
        JavaScript
        <div class="skill-bar"><div class="skill-fill" style="width:75%"></div></div>
    </div>
    <div class="skill">
        UI Design
        <div class="skill-bar"><div class="skill-fill" style="width:65%"></div></div>
    </div>
</div>

<!-- INTERESTS -->
<div class="section">
    <div class="interest-grid">
        <div class="interest">🌍 Climate Tech</div>
        <div class="interest">🤖 AI</div>
        <div class="interest">📱 App Dev</div>
        <div class="interest">🎨 Creative Design</div>
    </div>
</div>

</div>

<script>
function switchTab(index){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.querySelectorAll(".tab")[index].classList.add("active");
    document.querySelectorAll(".section")[index].classList.add("active");
}
</script>

</body>
</html>

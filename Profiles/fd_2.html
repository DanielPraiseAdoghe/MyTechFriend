<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Network Directory</title>

<style>
:root {
    --bg-light: #f5f5f5;
    --bg: #f2e3bb;
    --light-brown: #C0B87A;
    --light-green: #427A43;
    --dark-green: #005F02;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    padding:30px;
    color:var(--dark-green);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:30px;
}

.header h1{
    font-size:28px;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.controls input,
.controls select{
    padding:10px 15px;
    border-radius:25px;
    border:1px solid var(--light-brown);
    background:white;
}

/* GRID */
.friends-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

/* CARD */
.friend-card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:0.3s;
    position:relative;
}

.friend-card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* ONLINE PULSE */
.online{
    position:absolute;
    top:18px;
    right:18px;
    width:12px;
    height:12px;
    background:limegreen;
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(0,255,0,0.7);}
    70%{box-shadow:0 0 0 8px rgba(0,255,0,0);}
    100%{box-shadow:0 0 0 0 rgba(0,255,0,0);}
}

/* PROFILE TOP */
.profile-top{
    display:flex;
    align-items:center;
    gap:15px;
}

.avatar{
    width:65px;
    height:65px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid var(--light-brown);
}

.name{
    font-weight:600;
}

.country{
    font-size:13px;
    background:var(--light-brown);
    padding:4px 12px;
    border-radius:15px;
    margin-top:5px;
    display:inline-block;
}

/* SUMMARY */
.summary{
    margin:15px 0;
    font-size:14px;
    color:#444;
}

/* SKILLS */
.skills{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.skill{
    background:var(--bg-light);
    padding:5px 10px;
    border-radius:15px;
    font-size:12px;
}

/* STATS */
.stats{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
    font-size:13px;
    color:#555;
}

/* BUTTON */
.view-btn{
    display:block;
    text-align:center;
    padding:10px;
    border-radius:25px;
    background:var(--light-green);
    color:white;
    text-decoration:none;
    transition:0.3s;
    cursor:pointer;
}

.view-btn:hover{
    background:var(--dark-green);
}

/* RESPONSIVE */
@media(max-width:600px){
    body{ padding:15px; }
}
</style>
</head>
<body>

<div class="header">
    <h1>🌿 Youth Network</h1>
    <div class="controls">
        <input type="text" id="search" placeholder="Search name...">
        <select id="filterCountry">
            <option value="">All Countries</option>
            <option>Nigeria</option>
            <option>Kenya</option>
            <option>USA</option>
            <option>Ghana</option>
        </select>
    </div>
</div>

<div class="friends-grid" id="friendsGrid"></div>

<script>

/* MASTER FRIEND DATA */
const friends = [
{ name:"Aisha Bello", country:"Nigeria", img:"https://images.unsplash.com/photo-1596495578065-6e0763fa1178?w=400&q=80", summary:"Climate tech innovator and UI designer.", skills:["HTML","JS","Design"], rating:"4.8", projects:12 },

{ name:"Leo Mwangi", country:"Kenya", img:"https://images.unsplash.com/photo-1607746882042-944635dfe10e?w=400&q=80", summary:"Robotics and AI enthusiast.", skills:["Python","AI","Robotics"], rating:"4.6", projects:9 },

{ name:"Maria Gomez", country:"USA", img:"https://images.unsplash.com/photo-1588072432836-e10032774350?w=400&q=80", summary:"Creative app developer and artist.", skills:["Flutter","Art","UX"], rating:"4.9", projects:15 },

{ name:"Kwame Mensah", country:"Ghana", img:"https://images.unsplash.com/photo-1519456264917-42d0aa2e0625?w=400&q=80", summary:"Backend dev building school systems.", skills:["Node","MongoDB","APIs"], rating:"4.5", projects:8 },

{ name:"Zainab Yusuf", country:"Nigeria", img:"https://images.unsplash.com/photo-1577896851231-70ef18881754?w=400&q=80", summary:"STEM tutor and robotics mentor.", skills:["STEM","Robotics","Teaching"], rating:"4.7", projects:11 },

{ name:"Ethan Clark", country:"USA", img:"https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=400&q=80", summary:"Game dev and 3D modeling learner.", skills:["Unity","C#","3D"], rating:"4.4", projects:7 },

{ name:"Fatima Ali", country:"Kenya", img:"https://images.unsplash.com/photo-1520975916090-3105956dac38?w=400&q=80", summary:"Cybersecurity explorer.", skills:["Security","Linux","Python"], rating:"4.6", projects:10 },

{ name:"Daniel Okoro", country:"Nigeria", img:"https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=400&q=80", summary:"Frontend enthusiast and mentor.", skills:["React","CSS","HTML"], rating:"4.8", projects:13 },

{ name:"Sophia Reed", country:"USA", img:"https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=400&q=80", summary:"AI + climate research projects.", skills:["AI","Data","Research"], rating:"4.9", projects:16 },

{ name:"Brian Otieno", country:"Kenya", img:"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=400&q=80", summary:"IoT builder and hardware tinkerer.", skills:["IoT","Arduino","C++"], rating:"4.3", projects:6 },

{ name:"Hauwa Musa", country:"Nigeria", img:"https://images.unsplash.com/photo-1544717305-996b815c338c?w=400&q=80", summary:"Creative design and branding.", skills:["Branding","Figma","UI"], rating:"4.7", projects:12 },

{ name:"Noah Adams", country:"USA", img:"https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=400&q=80", summary:"Machine learning beginner.", skills:["ML","Python","Math"], rating:"4.5", projects:9 }
];
const grid = document.getElementById("friendsGrid");

/* RENDER FRIENDS */
function renderFriends(list){
    grid.innerHTML = "";

    list.forEach(friend=>{
        const card = document.createElement("div");
        card.className = "friend-card";

        card.innerHTML = `
            <div class="online"></div>

            <div class="profile-top">
                <img src="${friend.img}" class="avatar">
                <div>
                    <div class="name">${friend.name}</div>
                    <div class="country">${friend.country}</div>
                </div>
            </div>

            <div class="summary">${friend.summary}</div>

            <div class="skills">
                ${friend.skills.map(s=>`<div class="skill">${s}</div>`).join("")}
            </div>

            <div class="stats">
                <span>${friend.projects} Projects</span>
                <span>⭐ ${friend.rating}</span>
            </div>

            <div class="view-btn" onclick='openProfile(${JSON.stringify(friend)})'>
                View Profile
            </div>
        `;

        grid.appendChild(card);
    });
}

/* STORE + NAVIGATE */
function openProfile(friend){
    localStorage.setItem("selectedFriend", JSON.stringify(friend));
    window.location.href = "friend-profile.html";
}

/* SEARCH + FILTER */
document.getElementById("search").addEventListener("input", filterFriends);
document.getElementById("filterCountry").addEventListener("change", filterFriends);

function filterFriends(){
    const search = document.getElementById("search").value.toLowerCase();
    const country = document.getElementById("filterCountry").value;

    const filtered = friends.filter(friend=>{
        const matchName = friend.name.toLowerCase().includes(search);
        const matchCountry = country === "" || friend.country === country;
        return matchName && matchCountry;
    });

    renderFriends(filtered);
}

/* INITIAL LOAD */
renderFriends(friends);

</script>

</body>
</html>
